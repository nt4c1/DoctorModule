syntax = "proto3";

option java_multiple_files = true;
option java_package = "com.health.doctor";
option java_outer_classname = "Doctor";
option objc_class_prefix = "HLW";

package com.health.doctor;

service DoctorService {
  rpc send (DoctorRequest) returns (DoctorReply) {}
}

message DoctorRequest {
  string name = 1;
}

message DoctorReply {
  string message = 1;
}